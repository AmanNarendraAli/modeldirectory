{% extends "base.html" %}
{% block title %}Password Reset — The Modelling Directory{% endblock %}

{% block content %}
<div class="min-h-screen bg-stone-50 flex items-center justify-center py-12 px-4">
    <div class="bg-white rounded-2xl shadow-sm border border-stone-200 w-full max-w-sm p-8 text-center">
        <div class="mb-6">
            <svg class="mx-auto w-12 h-12 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
        </div>
        <h1 class="font-display text-2xl font-bold text-stone-900 mb-2">Password Reset</h1>
        <p class="text-stone-500 text-sm mb-6">Your password has been reset. You can now log in with your new password.</p>
        <a href="{% url 'login' %}" class="inline-block bg-stone-900 text-white font-semibold px-6 py-2.5 rounded-lg hover:bg-stone-700 transition-colors">
            Log In
        </a>
    </div>
</div>
{% endblock %}
