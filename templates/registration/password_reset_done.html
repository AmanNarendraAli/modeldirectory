{% extends "base.html" %}
{% block title %}Check Your Inbox — The Modelling Directory{% endblock %}

{% block content %}
<div class="min-h-screen bg-stone-50 flex items-center justify-center py-12 px-4">
    <div class="bg-white rounded-2xl shadow-sm border border-stone-200 w-full max-w-sm p-8 text-center">
        <div class="mb-6">
            <svg class="mx-auto w-12 h-12 text-blue-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
            </svg>
        </div>
        <h1 class="font-display text-2xl font-bold text-stone-900 mb-2">Check Your Inbox</h1>
        <p class="text-stone-500 text-sm mb-6">If an account exists with that email, we've sent password reset instructions. Check your inbox and spam folder.</p>
        <a href="{% url 'login' %}" class="inline-block text-stone-900 font-medium text-sm hover:underline">
            Back to login
        </a>
    </div>
</div>
{% endblock %}
