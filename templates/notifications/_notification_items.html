{% for notif in notifications %}
<a href="{% if notif.notification_type == 'follow' and notif.target_profile %}{% url 'model-detail' notif.target_profile.slug %}{% elif notif.notification_type == 'application_status_updated' %}{% url 'dashboard' %}{% elif notif.target_conversation %}{% url 'conversation-detail' pk=notif.target_conversation.pk %}{% else %}{% url 'notification-list' %}{% endif %}" class="block px-4 py-3 hover:bg-stone-50 transition-colors {% if not notif.is_read %}bg-blue-50/50{% endif %}">
    <p class="text-sm text-stone-800">{{ notif.display_text }}</p>
    <p class="text-xs text-stone-400 mt-0.5">{{ notif.created_at|timesince }} ago</p>
</a>
{% endfor %}
