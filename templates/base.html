<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}The Modelling Directory{% endblock %}</title>
    <meta name="description"
        content="{% block meta_description %}Discover modelling agencies and build your professional portfolio on The Modelling Directory.{% endblock %}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui'],
                        display: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        stone: {
                            950: '#0c0a09',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .font-display {
            font-family: 'Playfair Display', serif;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>

<body class="h-full bg-stone-50 text-stone-900 flex flex-col">

    {% include "partials/_navbar.html" %}

    <!-- Flash messages -->
    {% if messages %}
    <div class="fixed top-20 right-4 z-50 space-y-2 w-80">
        {% for message in messages %}
        <div class="flex items-start gap-3 rounded-lg p-4 shadow-lg text-sm font-medium
            {% if message.tags == 'error' %}bg-red-50 border border-red-200 text-red-800
            {% elif message.tags == 'success' %}bg-emerald-50 border border-emerald-200 text-emerald-800
            {% elif message.tags == 'warning' %}bg-amber-50 border border-amber-200 text-amber-800
            {% else %}bg-blue-50 border border-blue-200 text-blue-800{% endif %}">
            <span>{{ message }}</span>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>

    {% include "partials/_footer.html" %}

</body>

</html>
