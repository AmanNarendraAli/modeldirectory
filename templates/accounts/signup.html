{% extends "base.html" %}
{% block title %}Sign Up — The Modelling Directory{% endblock %}
{% block content %}
<h1>Create Account</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Create Account</button>
</form>
<p><a href="{% url 'login' %}">Already have an account? Login</a></p>
{% endblock %}
