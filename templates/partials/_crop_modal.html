<!-- Cropper.js CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">

<!-- Crop Modal Overlay -->
<div id="cropModal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/70 p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-xl overflow-hidden">
        <div class="flex items-center justify-between px-5 py-4 border-b border-stone-200">
            <h3 class="font-semibold text-stone-900">Crop Image</h3>
            <button type="button" id="cropCancel" class="text-stone-400 hover:text-stone-700 text-xl leading-none">&times;</button>
        </div>
        <div class="p-4 bg-stone-100">
            <div class="max-h-96 overflow-hidden flex items-center justify-center">
                <img id="cropPreviewImg" src="" alt="" class="max-w-full max-h-96 block">
            </div>
        </div>
        <div id="cropMinResNote" class="px-5 py-2 text-xs text-stone-400"></div>
        <div class="flex gap-3 px-5 py-4 border-t border-stone-200">
            <button type="button" id="cropCancel2" class="flex-1 border border-stone-300 text-stone-600 text-sm font-medium py-2.5 rounded-lg hover:bg-stone-50 transition-colors">Cancel</button>
            <button type="button" id="cropConfirm" class="flex-1 bg-stone-900 text-white text-sm font-medium py-2.5 rounded-lg hover:bg-stone-700 transition-colors">Crop &amp; Use</button>
        </div>
    </div>
</div>

<!-- Cropper.js JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
<script>
(function () {
    var cropModal = document.getElementById('cropModal');
    var cropPreviewImg = document.getElementById('cropPreviewImg');
    var cropMinResNote = document.getElementById('cropMinResNote');
    var cropper = null;
    var activeInput = null;
    var activeMinWidth = 0;
    var activeMinHeight = 0;

    function openModal(file, input, minW, minH) {
        activeInput = input;
        activeMinWidth = minW;
        activeMinHeight = minH;
        cropMinResNote.textContent = minW && minH ? 'Minimum size: ' + minW + ' x ' + minH + ' px' : '';
        var reader = new FileReader();
        reader.onload = function (e) {
            cropPreviewImg.src = e.target.result;
            cropModal.classList.remove('hidden');
            cropModal.classList.add('flex');
            if (cropper) { cropper.destroy(); cropper = null; }
            cropper = new Cropper(cropPreviewImg, { viewMode: 1, aspectRatio: NaN, autoCropArea: 1, movable: true, zoomable: true, rotatable: false });
        };
        reader.readAsDataURL(file);
    }

    function closeModal() {
        cropModal.classList.add('hidden');
        cropModal.classList.remove('flex');
        if (cropper) { cropper.destroy(); cropper = null; }
    }

    document.getElementById('cropCancel').addEventListener('click', closeModal);
    document.getElementById('cropCancel2').addEventListener('click', closeModal);

    document.getElementById('cropConfirm').addEventListener('click', function () {
        if (!cropper || !activeInput) return;
        var canvas = cropper.getCroppedCanvas({ minWidth: activeMinWidth || 1, minHeight: activeMinHeight || 1 });
        if (!canvas) { closeModal(); return; }
        if (activeMinWidth && activeMinHeight && (canvas.width < activeMinWidth || canvas.height < activeMinHeight)) {
            alert('The cropped area is too small. Minimum required: ' + activeMinWidth + ' x ' + activeMinHeight + ' px. Please select a larger area or upload a larger image.');
            return;
        }
        canvas.toBlob(function (blob) {
            var fileName = (activeInput.dataset.filename || 'image') + '.webp';
            var file = new File([blob], fileName, { type: 'image/webp' });
            var dt = new DataTransfer();
            dt.items.add(file);
            activeInput.files = dt.files;
            var previewId = activeInput.dataset.previewTarget;
            if (previewId) {
                var previewEl = document.getElementById(previewId);
                if (previewEl) { previewEl.src = URL.createObjectURL(blob); previewEl.classList.remove('hidden'); }
            }
            closeModal();
        }, 'image/webp', 0.85);
    });

    document.querySelectorAll('input[type="file"][data-crop]').forEach(function (input) {
        input.addEventListener('change', function (e) {
            var file = e.target.files[0];
            if (!file) return;
            var minW = parseInt(input.dataset.cropMinWidth || '0', 10);
            var minH = parseInt(input.dataset.cropMinHeight || '0', 10);
            openModal(file, input, minW, minH);
        });
    });
})();
</script>
