<!-- Cropper.js CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">

<!-- Crop Modal Overlay — clicks on backdrop are blocked -->
<div id="cropModal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/70 p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-xl overflow-hidden" onclick="event.stopPropagation()">
        <div class="flex items-center justify-between px-5 py-4 border-b border-stone-200">
            <h3 class="font-semibold text-stone-900">Crop Image</h3>
            <button type="button" id="cropCancel" class="text-stone-400 hover:text-stone-700 text-xl leading-none">&times;</button>
        </div>
        <div class="p-4 bg-stone-100">
            <div class="max-h-96 overflow-hidden flex items-center justify-center">
                <img id="cropPreviewImg" src="" alt="" class="max-w-full max-h-96 block">
            </div>
        </div>
        <div id="cropMinResNote" class="px-5 py-2 text-xs text-stone-400"></div>
        <div class="flex gap-3 px-5 py-4 border-t border-stone-200">
            <button type="button" id="cropCancel2" class="flex-1 border border-stone-300 text-stone-600 text-sm font-medium py-2.5 rounded-lg hover:bg-stone-50 transition-colors">Cancel</button>
            <button type="button" id="cropRotate" class="border border-stone-300 text-stone-600 text-sm font-medium px-4 py-2.5 rounded-lg hover:bg-stone-50 transition-colors">&#8635; Rotate</button>
            <button type="button" id="cropConfirm" class="flex-1 bg-stone-900 text-white text-sm font-medium py-2.5 rounded-lg hover:bg-stone-700 transition-colors">Use</button>
        </div>
    </div>
</div>

<!-- Cropper.js JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
<script>
(function () {
    var cropModal = document.getElementById('cropModal');
    var cropPreviewImg = document.getElementById('cropPreviewImg');
    var cropMinResNote = document.getElementById('cropMinResNote');
    var cropper = null;
    var activeInput = null;
    var activeAspectRatio = NaN;

    function initCropper() {
        if (cropper) { cropper.destroy(); cropper = null; }
        cropper = new Cropper(cropPreviewImg, {
            viewMode: 1,
            aspectRatio: activeAspectRatio,
            autoCropArea: 1,
            movable: true,
            zoomable: true,
            rotatable: true,
        });
    }

    function openModalWithDataUrl(dataUrl, input, ratio) {
        activeInput = input;
        activeAspectRatio = ratio;
        cropMinResNote.textContent = isNaN(ratio) ? '' : (ratio === 1 ? 'Aspect ratio: 1:1 (square)' : 'Aspect ratio: ' + ratio + ':1');

        if (cropper) { cropper.destroy(); cropper = null; }

        cropPreviewImg.src = '';
        cropModal.classList.remove('hidden');
        cropModal.classList.add('flex');

        cropPreviewImg.onload = function () {
            cropPreviewImg.onload = null;
            initCropper();
        };
        cropPreviewImg.src = dataUrl;
    }

    function openModalFromFile(file, input, ratio) {
        var reader = new FileReader();
        reader.onload = function (e) {
            openModalWithDataUrl(e.target.result, input, ratio);
        };
        reader.readAsDataURL(file);
    }

    window.openCropFromUrl = function (url, input, ratio) {
        fetch(url)
            .then(function (r) { return r.blob(); })
            .then(function (blob) {
                var objectUrl = URL.createObjectURL(blob);
                openModalWithDataUrl(objectUrl, input, ratio);
            });
    };

    function closeModal() {
        cropModal.classList.add('hidden');
        cropModal.classList.remove('flex');
        if (cropper) { cropper.destroy(); cropper = null; }
    }

    function cancelCrop() {
        // Clear the file input so the uncropped raw file is never submitted
        if (activeInput) {
            activeInput.value = '';
        }
        closeModal();
    }

    document.getElementById('cropCancel').addEventListener('click', cancelCrop);
    document.getElementById('cropCancel2').addEventListener('click', cancelCrop);

    // Block backdrop clicks — modal can only be closed via Cancel or Use
    cropModal.addEventListener('click', function (e) {
        if (e.target === cropModal) { e.stopPropagation(); }
    });

    document.getElementById('cropRotate').addEventListener('click', function () {
        if (cropper) { cropper.rotate(90); }
    });

    document.getElementById('cropConfirm').addEventListener('click', function () {
        if (!cropper || !activeInput) return;
        var canvas = cropper.getCroppedCanvas();
        if (!canvas) { closeModal(); return; }
        canvas.toBlob(function (blob) {
            var fileName = (activeInput.dataset.filename || 'image') + '.webp';
            var file = new File([blob], fileName, { type: 'image/webp' });
            var dt = new DataTransfer();
            dt.items.add(file);
            activeInput.files = dt.files;
            var previewId = activeInput.dataset.previewTarget;
            if (previewId) {
                var previewEl = document.getElementById(previewId);
                if (previewEl) {
                    previewEl.src = URL.createObjectURL(blob);
                    previewEl.classList.remove('hidden');
                }
            }
            closeModal();
        }, 'image/webp', 0.85);
    });

    // Event delegation — handles both static and dynamically added file inputs
    document.addEventListener('change', function (e) {
        var input = e.target;
        if (input.tagName !== 'INPUT' || input.type !== 'file' || !input.hasAttribute('data-crop')) return;
        var file = input.files[0];
        if (!file) return;
        var ratio = parseFloat(input.dataset.cropRatio);
        if (isNaN(ratio)) ratio = NaN;
        openModalFromFile(file, input, ratio);
    });

    // Wire re-crop buttons
    document.querySelectorAll('[data-recrop-input]').forEach(function (btn) {
        btn.addEventListener('click', function (e) {
            e.preventDefault();
            var inputEl = document.getElementById(btn.dataset.recropInput);
            var url = btn.dataset.recropUrl;
            var ratio = parseFloat(btn.dataset.cropRatio);
            if (isNaN(ratio)) ratio = NaN;
            if (!inputEl || !url) return;
            window.openCropFromUrl(url, inputEl, ratio);
        });
    });
})();
</script>
