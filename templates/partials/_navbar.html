<nav class="bg-white border-b border-stone-200 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">

            <!-- Logo -->
            <a href="{% url 'home' %}" class="flex items-center gap-2">
                <span class="font-display text-xl font-bold tracking-tight text-stone-900">The Modelling
                    Directory</span>
            </a>

            <!-- Nav links -->
            <div class="hidden md:flex items-center gap-8">
                <a href="{% url 'agency-list' %}"
                    class="text-sm font-medium text-stone-600 hover:text-stone-900 transition-colors">Agencies</a>
                <a href="{% url 'model-list' %}"
                    class="text-sm font-medium text-stone-600 hover:text-stone-900 transition-colors">Models</a>
                <a href="{% url 'resource-list' %}"
                    class="text-sm font-medium text-stone-600 hover:text-stone-900 transition-colors">Resources</a>
            </div>

            <!-- Auth -->
            <div class="flex items-center gap-3">
                {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}" class="text-sm font-medium text-stone-600 hover:text-stone-900 transition-colors hidden sm:block">Dashboard</a>
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="text-sm font-medium text-stone-500 hover:text-stone-900 transition-colors">Logout</button>
                </form>
                {% else %}
                <a href="{% url 'login' %}"
                    class="text-sm font-medium text-stone-600 hover:text-stone-900 transition-colors">Login</a>
                <a href="{% url 'signup' %}"
                    class="bg-stone-900 text-white text-sm font-medium px-4 py-2 rounded-lg hover:bg-stone-700 transition-colors">Sign
                    Up</a>
                {% endif %}
            </div>

        </div>
    </div>
</nav>
